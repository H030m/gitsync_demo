name: gitsync
description: "GitSync — GitHub × Discord 整合 + AI Agent 任務助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Persist the UI language choice
  shared_preferences: ^2.3.2

  # 課程指定（state mgmt + 路由）
  provider: ^6.1.2
  go_router: ^14.0.2

  # Firebase
  firebase_core: ^2.26.0
  firebase_auth: ^4.4.0
  cloud_firestore: ^4.15.7
  cloud_functions: ^4.7.5
  firebase_messaging: ^14.9.2
  firebase_storage: ^11.1.0

  # Show OS-level notifications while the app is in the foreground (FCM alone
  # only surfaces them when backgrounded on Android).
  flutter_local_notifications: ^17.2.4

  # UI
  google_fonts: ^6.1.0
  flutter_native_splash: ^2.3.10

  # Render AI-generated Markdown (Discord digest / daily summary / handoff)
  flutter_markdown: ^0.7.4

  # Stats 圓餅圖 / 長條圖（Sprint 5 用；先加上方便骨架展示）
  fl_chart: ^0.66.0

  # Task dependency DAG (TasksBoard Graph tab)
  graphview: ^1.2.0

  # Open GitHub issue/PR links from the task detail page
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
